name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install -y mingw

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx pydantic rich typer tree-sitter tree-sitter-c tomli

      - name: Verify environment
        run: python -m alchemist.cli doctor
        continue-on-error: true

      - name: Run unit tests (skip live-LLM suite)
        run: python -m pytest tests/ --ignore=tests/test_local_llm.py -v
        env:
          PYTHONIOENCODING: utf-8

      - name: Run anti-stub gate on repo (self-check)
        if: always()
        run: |
          python -c "
          from pathlib import Path
          from alchemist.implementer.anti_stub import scan_workspace
          r = scan_workspace(Path('alchemist'))
          print(r.summary())
          "

  phase-d-smoke:
    name: phase D smoke (Stage 5 gate refuses broken output)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest httpx pydantic rich typer tree-sitter tree-sitter-c tomli

      - name: Phase D structural tests (do not require live server)
        run: pytest tests/test_phase_d_zlib.py -v -k "not test_stage5_refuses_success_on_current_zlib"
        env:
          PYTHONIOENCODING: utf-8

  crypto-plugin:
    name: crypto plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pydantic httpx rich typer tree-sitter tree-sitter-c
      - run: pytest tests/test_plugins.py -v
        env:
          PYTHONIOENCODING: utf-8
